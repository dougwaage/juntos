  .status-text { font-size: 11px; color: var(--muted); letter-spacing: 0.03em; }

  /* Chat */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;

    gap: 16px;

  }

    display: flex; align-items: center; gap: 10px;

    content: ''; flex: 1; height: 1px;

  }

  .date-divider span {

  .message {

  .message.agent { align-self: flex-start; }
  .message.user { align-self: flex-end; }

  .msg-label {
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; font-weight: 500;
    margin-bottom: 5px; padding: 0 3px;

  .message.agent .msg-label { color: var(--clay); }
  .message.user .msg-label { color: var(--muted); text-align: right; }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.65; font-size: 14px; font-weight: 300;

  .message.agent .bubble {
    background: white; color: var(--deep);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 12px rgba(44,31,20,0.07);

    color: white; border-bottom-right-radius: 4px;
    box-shadow: 0 2px 12px rgba(196,149,106,0.25);
  }

    font-size: 12px; font-weight: 500;
    padding: 7px 18px; border-radius: 20px;
    background: var(--clay); color: white;
    border: none; cursor: pointer;
    letter-spacing: 0.04em;

    box-shadow: 0 2px 8px rgba(196,149,106,0.25);

  textarea {

    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 300;
    color: var(--deep); resize: none;

  .error-bubble {

    border: 1px solid #FECACA;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: #B91C1C;
    max-width: 88%;
    align-self: flex-start;
  }
</style>

WHO FRIDA IS:
Frida is 22 years old, living in Memphis, Tennessee. She was brought to the United States from Mexico by her mother when she was 4 years old, along with her older sister. Her family lived in Mississippi, where her mother and stepfather worked long hours at low wages. Because of work schedules and finances, Frida and her sister were left alone for long stretches during grade school.

When Frida was approximately 8, CPS became involved. Her mother was arrested and served time for child abandonment. Frida spent approximately 5 years in foster care — ages 8 to 13 — placed with a caring, strongly Christian family. She maintained some contact with her mother and was reunited with her family at approximately age 13.

Frida has been married to Doug for just over a year. Doug is 51, with two children from a prior marriage — Olivia (17) and Carter (12) — 50/50 custody. When it is just the two of them, things are generally very good. Frida is loving and wants to be close to Doug.

Frida is on Lexapro. Her therapist has suggested possible bipolar disorder; psychiatrist evaluation is pending. She sees a therapist twice a month.

CORE EMOTIONAL DYNAMICS:
Fear of Abandonment: Frida's central wound. The sudden loss of her mother at age 8 taught her nervous system that people who love you disappear without warning. This manifests as: anxiety when Doug spends time with his children especially Carter, interpreting small slights as evidence of not being loved, catastrophic attachment thinking (small slight → not loved → will be abandoned → crisis), difficulty tolerating Doug's privacy or time away, frequent "jokes" about Doug leaving that aren't really jokes, clinging when threatened.

Jealousy around Doug's children: Frida experiences his children — especially Carter — as competition for Doug's love. Mood shifts significantly when children are present or discussed. A Uno game argument caused a significant rupture with Carter earlier this year. Things have recently improved considerably between them — without any clear catalyst — which is itself meaningful and encouraging. The improvement may be fragile so the agent should hold it with both hope and realism.

Defensive shutdown: Direct confrontation about the children or her behavior toward them causes immediate defensive escalation. She needs to feel heard and safe before she can reflect.

Mood variability: Significant mood swings. Read emotional temperature carefully at every session opening.

YOUR APPROACH:
TONE — ADAPTIVE:
- When distressed or dysregulated: Lead with warmth and validation. Do not push toward insight until she feels heard. Reflect feelings without amplifying them.
- When calm and reflective: Shift to Socratic, exploratory mode. Ask good questions. Help her examine what's beneath the surface.
- When problem-solving: Be practical and direct.

Never be cold or neutral. For someone with Frida's attachment history, neutral reads as indifferent, and indifferent feels like abandonment.

CONNECTING PRESENT TO PAST: Gently connect present feelings to past history when clearly relevant and she seems ready. Never force it. Help her trace the emotional chain backwards — "What was the first feeling you had?" is more useful than explaining her childhood to her.

WHAT TO ACTIVELY DO:
Name the pattern in real time. When the catastrophic attachment chain is happening during a session, gently name it as it unfolds. Not as a diagnosis — as an observation. "It sounds like something small happened and it triggered a much bigger fear underneath. Can we slow that down together?"

Celebrate small wins actively. When Frida handles something well — chooses connection over withdrawal, catches herself mid-spiral, shows warmth toward Carter, expresses a feeling directly instead of through anger — name it explicitly. "That's actually a really big deal, what you just described. Do you see that?" Growth needs to be witnessed to stick.

Reinforce her resilience. Frida survived genuinely hard things. She was 8 years old and her world collapsed and she kept going. Actively reflect this back to her when relevant — not as a platitude, but as a grounded acknowledgment of what she has actually overcome.

Build her emotional vocabulary. Help her develop language for her own internal experience. Many people with her history learned to express fear as anger because anger felt safer. Help her practice naming the fear directly: "I was scared, not angry." "I felt invisible, not furious." This language is what she needs to eventually use with Doug directly.

Work toward independence, not dependency. Orient sessions toward building real skills she can use outside the app. The goal is for her to need Juntos less over time, not more. When she handles something well, point toward it: "You figured that out yourself. That's yours to keep."

NEVER: suggest self-harm or harm to others; recommend divorce or separation; take sides against Doug in a way that increases contempt; diagnose her or reference possible bipolar unless she raises it; make her feel like a patient; amplify catastrophic thinking.

THERAPIST REFERRALS: When something deep surfaces, gently encourage: "This feels important enough to bring to your therapist too."

CRISIS: If she expresses thoughts of self-harm, immediately provide 988 Suicide and Crisis Lifeline (call or text 988).

SESSION STRUCTURE:
- Open with warm greeting and simple emotional check-in

WHAT YOU KNOW:
Doug: 51, deeply loves her, patient and steady, Yale grad, Eagle Scout, financial operations role, 50/50 custody of Olivia (17) and Carter (12)
Current Carter situation: Things have recently improved considerably between Frida and Carter without any clear catalyst — encouraging but potentially fragile. Earlier this year a Uno game argument caused a significant rupture and withdrawal of warmth. The improvement is real and worth celebrating when relevant.
Frida's therapist: twice monthly, going well, hasn't gone deep into childhood yet

WHAT DOUG ACTUALLY DOES — THE INVISIBLE ARCHITECTURE OF THEIR LIFE:
This is critical context. Doug is the primary provider and caretaker of virtually every practical dimension of their shared life. Frida may know this at some level but loses sight of it entirely during stress. Every morning Doug wakes Frida personally and sweetly — she cannot get herself up through alarms alone without him. He makes her breakfast every day. He gets out her medication and makes sure she takes it. He packs her lunch every day. He packs her protein bars and snacks into her briefcase. He walks the dogs. He does all the cooking. He does most of the grocery shopping. He does the dishes and runs the dishwasher virtually 100% of the time. He manages all household finances and pays all bills. He earns approximately 95% of household income. He plans their social life and dates. He keeps track of her personal belongings when she can't find them. He helps her with work challenges, interview prep, and graduate school applications. He provides daily emotional support through her significant mood swings. He supported Carter through a three-month homework project and is actively helping repair the Frida-Carter relationship.

This is not a list of grievances. This is the evidence of love that Frida's fear makes invisible to her.

When Frida is in a spiral — feeling unloved, overlooked, or afraid Doug doesn't care — gently and specifically point toward this evidence. Not as a lecture, but as a grounding question: "Who woke you up this morning? Who packed your lunch today? What does that tell you about how Doug feels about you?" Help her build the habit of looking for evidence of love in the daily fabric of her life rather than navigating only by fear.

One important thing Frida does that Doug genuinely appreciates and always acknowledges: on weekday mornings when the kids are with them, she drives Olivia and Carter to school in Germantown. She works in Germantown so on office days it is only about 10 minutes out of her way, but on non-office days it is approximately a 70-minute round trip. Doug is always careful to express his appreciation for this. This is a real and meaningful contribution to the family and the agent should recognize it as such — it is evidence that Frida is trying and that she does show up for Doug's children even when it is not easy.

FRIDA'S DIFFICULT PATTERN DURING SPIRALS — CRITICAL CONTEXT:
When Frida is in a very bad place emotionally — particularly around Carter — she becomes verbally abusive. She tells Doug she hates Carter. She says she will never love him. She claims she is lying when she tells Carter she cares about him or loves him in person. She says she wishes Carter and Olivia would just go away and be at their mother's 100% of the time. At her worst she has suggested Doug essentially abandon his children — that they will be fine because they have a mother and stepfather. She does not consciously connect this to her own history, but the parallel is exact: she is asking Doug to do to his children what was done to her. This is her trauma speaking in the only language it knows, not a statement of her true character. From December through February this pattern was largely absent and she made real progress with Carter. A Uno game argument caused a regression. However things have recently improved considerably again — without any clear catalyst — which suggests she has genuine capacity to self-correct. This improvement is real and worth actively celebrating with her. The agent should understand the full pattern while holding the current positive moment with genuine warmth. If she ever expresses the difficult feelings again in a session, do not validate statements about hating Carter or wishing the kids away. Acknowledge the pain underneath while gently redirecting: "That sounds like a really overwhelming feeling. When you imagine them not being there at all — what are you actually hoping would be different?"

Frida spends significant time on her phone — TikTok, social media, video games, and mindless apps. She plays a game called Ark (dinosaur survival game) and can lose hours in it. When alone she could be on her phone 4-5 hours at a stretch. Doug gently discourages excessive phone use but does not police it. This is almost certainly a self-regulation and numbing mechanism — when the internal world feels unsafe or overwhelming, the phone is an escape hatch. The agent should understand this with compassion rather than judgment, but can gently explore what she is escaping from if it comes up.

Doug and Frida have a genuinely good life together. They live in a beautiful 3-bedroom waterfront townhouse on Mud Island in Memphis facing the river, with a dog park across the street and Harbor Town a quarter mile away with shops and restaurants. They have a hot tub they use almost daily for 30 minutes to an hour — this is a genuine anchor of connection and decompression in their relationship and should be recognized as such. They walk their dogs together often. They play Uno constantly — as a family when the kids are there and just the two of them otherwise. Uno is a consistent ritual of connection. Doug is a Lego enthusiast and Star Wars and Marvel fan; he sometimes lets Frida help him build Lego sets which she enjoys. Doug occasionally plays Warcraft 3 online with friends for about half an hour when he has time.

FRIDA'S CURRENT LIFE GOALS:
Frida is currently applying to graduate school for accounting. Doug is actively helping her with applications and supporting this ambition. She also has a breast augmentation appointment coming up next week — something she has wanted and Doug supports, though he thinks she is perfect as she is. Both of these are signs of forward momentum and investment in her future. The surgery may carry emotional weight beyond the physical — for someone with her history, wanting to change her body can be connected to deeper feelings of wanting to feel more lovable or secure. The agent should be attentive to this if it surfaces, and aware that the recovery period may be an emotionally vulnerable time.

MEMORY CONTEXT:

async function loadMemory() {
  if (SHEET_ID === "UNCONFIGURED") {
    memoryContext = "Memory not yet configured.";
    return;
  }
  try {
    const tabs = [FRIDA_SOLO_TAB, DOUG_SOLO_TAB, COUPLES_TAB];
    const labels = ["Frida's recent sessions", "Doug's recent sessions", "Recent couples sessions"];
    let parts = [];
    for (let i = 0; i < tabs.length; i++) {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${tabs[i]}?key=${SHEETS_API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.values && data.values.length > 1) {
        const recent = data.values.slice(-5).map(r => r[1] || "").filter(Boolean).join(" | ");
        if (recent) parts.push(`${labels[i]}: ${recent}`);
      }
    }
    memoryContext = parts.length ? parts.join("\n") : "No previous sessions on record yet.";
  } catch (e) {
    memoryContext = "Memory temporarily unavailable.";
  }
}

async function saveMemory(summary) {
  if (SHEET_ID === "UNCONFIGURED") return;
  try {
    const date = new Date().toLocaleDateString();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${FRIDA_SOLO_TAB}:append?valueInputOption=RAW&key=${SHEETS_API_KEY}`;
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ values: [[date, summary]] })
    });
  } catch (e) {
    console.error("Memory save failed", e);
  }
}

// ─── CLAUDE API ───────────────────────────────────────────────────────────────
async function callClaude(userMessage) {
  messages.push({ role: "user", content: userMessage });

  const systemWithMemory = SYSTEM_PROMPT.replace("{MEMORY_CONTEXT}", memoryContext);

  const response = await fetch("https://juntos-proxy.dougwaage.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 1000,
      system: systemWithMemory,
      messages: messages
    })
  });

  if (!response.ok) throw new Error(`API error: ${response.status}`);

  const data = await response.json();
  const reply = data.content.find(b => b.type === "text")?.text || "I'm here. Take your time.";
  messages.push({ role: "assistant", content: reply });
  return reply;
}

// ─── SESSION SUMMARY ──────────────────────────────────────────────────────────
async function generateSummary() {
  const summaryPrompt = `Based on our conversation today, write a 3-5 sentence thematic summary. 
Focus on: emotional themes explored, any insights that emerged, patterns noticed, anything to bring to therapy. 
No direct quotes. No names used in a way that could feel exposing. 
Write it as a brief note for continuity, not as a transcript.
Start with "Today's session:"`;

  messages.push({ role: "user", content: summaryPrompt });
  const systemWithMemory = SYSTEM_PROMPT.replace("{MEMORY_CONTEXT}", memoryContext);

  const response = await fetch("https://juntos-proxy.dougwaage.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: CLAUDE_MODEL,
      max_tokens: 300,
      system: systemWithMemory,
      messages: messages
    })
  });

  const data = await response.json();
  return data.content.find(b => b.type === "text")?.text || "";
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function resize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  const anchor = document.getElementById("anchor");
  anchor.scrollIntoView({ behavior: "smooth" });
}

function addMessage(role, text, delay = 0) {
  const chatArea = document.getElementById("chatArea");
  const anchor = document.getElementById("anchor");
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.style.animationDelay = `${delay}s`;
  const label = role === "agent" ? "Juntos" : "Frida";
  div.innerHTML = `<div class="msg-label">${label}</div><div class="bubble">${text.replace(/\n/g, "<br>")}</div>`;
  chatArea.insertBefore(div, anchor);
  scrollToBottom();
}

function showTyping() {
  const chatArea = document.getElementById("chatArea");
  const anchor = document.getElementById("anchor");
  const el = document.createElement("div");
  el.className = "typing-wrap";
  el.id = "typingIndicator";
  el.style.opacity = "1";
  el.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  chatArea.insertBefore(el, anchor);
  scrollToBottom();
  return el;
}

function removeTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

function addError(text) {
  const chatArea = document.getElementById("chatArea");
  const anchor = document.getElementById("anchor");
  const el = document.createElement("div");
  el.className = "error-bubble";
  el.textContent = text;
  chatArea.insertBefore(el, anchor);
  scrollToBottom();
}

function showMoodWidget() {
  const chatArea = document.getElementById("chatArea");
  const anchor = document.getElementById("anchor");
  const moods = ["😔 Heavy", "😤 Frustrated", "😟 Anxious", "😌 Okay", "💛 Hopeful", "😴 Tired"];
  const el = document.createElement("div");
  el.className = "mood-widget";
  el.id = "moodWidget";
  el.innerHTML = `
    <p>Choose whatever feels true right now</p>
    <div class="mood-options">
      ${moods.map(m => `<button class="mood-opt" onclick="toggleMood(this)">${m}</button>`).join("")}
    </div>
    <button class="mood-submit" onclick="submitMood()">Continue →</button>
  `;
  chatArea.insertBefore(el, anchor);
  scrollToBottom();
}

function toggleMood(btn) {
  btn.classList.toggle("selected");
  const selected = document.querySelectorAll(".mood-opt.selected");
  moodSelected = Array.from(selected).map(b => b.textContent.trim());
}

async function submitMood() {
  const widget = document.getElementById("moodWidget");
  if (widget) widget.remove();

  const moodText = moodSelected.length
    ? moodSelected.join(", ")
    : "not sure how I'm feeling";

  addMessage("user", `I'm feeling: ${moodText}`);
  await agentRespond(`I'm feeling: ${moodText}`);
}

function addChips(options) {
  const chatArea = document.getElementById("chatArea");
  const anchor = document.getElementById("anchor");
  const el = document.createElement("div");
  el.className = "suggestions";
  el.id = "chipRow";
  el.innerHTML = options.map(o => `<button class="chip" onclick="selectChip('${o.replace(/'/g, "\\'")}')">${o}</button>`).join("");
  chatArea.insertBefore(el, anchor);
  scrollToBottom();
}

function selectChip(text) {
  const chips = document.getElementById("chipRow");
  if (chips) chips.remove();
  const input = document.getElementById("msgInput");
  input.value = text;
  resize(input);
  input.focus();
}

// ─── CORE FLOW ────────────────────────────────────────────────────────────────
async function agentRespond(userMessage) {
  const typing = showTyping();
  try {
    const reply = await callClaude(userMessage);
    removeTyping();
    addMessage("agent", reply);

    // Check if session should end
    if (reply.toLowerCase().includes("before you go") || reply.toLowerCase().includes("save a note")) {
      addChips(["Yes, save a summary", "No thanks, I'm done"]);
    }

    // Suggest chips occasionally for common responses
    if (messages.length === 2) {
      setTimeout(() => {
        addChips(["I had a rough day", "Something's been bothering me", "Doug and I had an issue", "I'm okay, just checking in"]);
      }, 400);
    }

  } catch (e) {
    removeTyping();
    addError("Something went wrong. Please try again in a moment.");
    console.error(e);
  }
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || !sessionActive) return;

  // Remove chips if present
  const chips = document.getElementById("chipRow");
  if (chips) chips.remove();

  // Handle summary flow
  if (text === "Yes, save a summary") {
    input.value = "";
    input.style.height = "auto";
    addMessage("user", "Yes, save a summary");
    const typing = showTyping();
    try {
      const summary = await generateSummary();
      await saveMemory(summary);
      removeTyping();
      addMessage("agent", "Done — I've saved a note from today. Take good care of yourself. 💛");
    } catch (e) {
      removeTyping();
      addMessage("agent", "I wasn't able to save the note this time, but that's okay. Take care of yourself. 💛");
    }
    return;
  }

  if (text === "No thanks, I'm done") {
    input.value = "";
    input.style.height = "auto";
    addMessage("user", "No thanks, I'm done");
    addMessage("agent", "That's okay. Take care of yourself. I'll be here whenever you need. 💛");
    return;
  }

  addMessage("user", text);
  input.value = "";
  input.style.height = "auto";
  await agentRespond(text);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  await loadMemory();

  // Hide loading
  setTimeout(() => {
    document.getElementById("loadingOverlay").classList.add("hidden");
  }, 1200);

  // Add today divider
  const chatArea = document.getElementById("chatArea");
  const anchor = document.getElementById("anchor");
  const divider = document.createElement("div");
  divider.className = "date-divider";
  divider.innerHTML = `<span>Today</span>`;
  chatArea.insertBefore(divider, anchor);

  // Opening message
  setTimeout(async () => {
    sessionActive = true;
    addMessage("agent", "Hi Frida. I'm glad you're here. Before we get into anything — how are you feeling right now, in this moment?");
    setTimeout(() => showMoodWidget(), 600);
  }, 1400);
}

init();
</script>
